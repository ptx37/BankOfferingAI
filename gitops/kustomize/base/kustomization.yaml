apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bankoffer

resources:
  - namespace.yaml

commonLabels:
  app.kubernetes.io/part-of: bankoffer

helmCharts:
  - name: bankoffer-api
    repo: oci://ghcr.io/your-org/charts
    version: 0.1.0
    releaseName: bankoffer-api
    namespace: bankoffer
    valuesFile: ../../../infra/helm/bankoffer-api/values.yaml

  - name: bankoffer-worker
    repo: oci://ghcr.io/your-org/charts
    version: 0.1.0
    releaseName: bankoffer-worker
    namespace: bankoffer
    valuesFile: ../../../infra/helm/bankoffer-worker/values.yaml

  - name: bankoffer-frontend
    repo: oci://ghcr.io/your-org/charts
    version: 0.1.0
    releaseName: bankoffer-frontend
    namespace: bankoffer
    valuesFile: ../../../infra/helm/bankoffer-frontend/values.yaml

configMapGenerator:
  - name: bankoffer-kafka-config
    literals:
      - bootstrap-servers=PLACEHOLDER
      - topics=bank.transactions,offer.events,notification.events
