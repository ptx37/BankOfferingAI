global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default

  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-critical
      continue: true

    - matchers:
        - severity="critical"
      receiver: slack-critical

    - matchers:
        - severity="warning"
      receiver: slack-warnings

    - matchers:
        - alertname="KafkaConsumerLagCritical"
      receiver: pagerduty-critical

receivers:
  - name: slack-default
    slack_configs:
      - channel: '#bankoffer-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Since:* {{ .StartsAt | humanizeTimestamp }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - channel: '#bankoffer-critical'
        send_resolved: true
        title: ':fire: CRITICAL: {{ .CommonAnnotations.summary }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: slack-warnings
    slack_configs:
      - channel: '#bankoffer-alerts'
        send_resolved: true
        title: ':warning: WARNING: {{ .CommonAnnotations.summary }}'

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        description: '{{ .CommonAnnotations.summary }}'
        severity: critical
        details:
          description: '{{ .CommonAnnotations.description }}'
          firing: '{{ .Alerts.Firing | len }} alerts firing'

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'cluster', 'service']
