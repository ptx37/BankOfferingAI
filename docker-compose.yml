version: '3.9'

services:
  # ==================== Data Layer ====================
  postgres:
    image: postgres:16-alpine
    container_name: bankoffer-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bankofferingai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/api/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankoffer-network

  redis:
    image: redis:7-alpine
    container_name: bankoffer-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankoffer-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bankoffer-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "0.0.0.0:9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/bin/kafka-broker-api-versions.sh && kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankoffer-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bankoffer-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "0.0.0.0:2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankoffer-network

  # ==================== API Layer ====================
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: bankoffer-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bankofferingai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      KAFKA_BROKER: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-test}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankoffer-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: bankoffer-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bankofferingai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      KAFKA_BROKER: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-test}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bankoffer-network
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    container_name: bankoffer-notification
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bankofferingai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      KAFKA_BROKER: kafka:9092
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bankoffer-network
    restart: unless-stopped

  # ==================== Frontend ====================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bankoffer-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - api
    networks:
      - bankoffer-network
    restart: unless-stopped

  # ==================== Observability ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: bankoffer-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libs'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "0.0.0.0:9090:9090"
    depends_on:
      - api
    networks:
      - bankoffer-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: bankoffer-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "0.0.0.0:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - bankoffer-network
    restart: unless-stopped

  # ==================== Development Tools ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bankoffer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "0.0.0.0:5050:80"
    networks:
      - bankoffer-network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bankoffer-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "0.0.0.0:8081:8081"
    depends_on:
      - redis
    networks:
      - bankoffer-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  bankoffer-network:
    driver: bridge
