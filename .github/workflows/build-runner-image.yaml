name: Build Runner Image

# Builds the CI/CD runner Docker image and pushes it to GitHub Container Registry.
# Triggered when the runner Dockerfile itself changes, or manually.
# The resulting image can be used as the container for CI jobs, or as the base
# for a self-hosted runner running in Docker.

on:
  push:
    branches: [main]
    paths:
      - ".github/runner-image/**"
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR (true/false)"
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

jobs:
  build-runner-image:
    name: Build & Push Runner Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/runner
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .github/runner-image
          file: .github/runner-image/Dockerfile
          push: ${{ github.event.inputs.push != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## Runner Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/runner:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use this image in CI jobs:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`yaml" >> $GITHUB_STEP_SUMMARY
          echo "jobs:" >> $GITHUB_STEP_SUMMARY
          echo "  my-job:" >> $GITHUB_STEP_SUMMARY
          echo "    runs-on: self-hosted" >> $GITHUB_STEP_SUMMARY
          echo "    container:" >> $GITHUB_STEP_SUMMARY
          echo "      image: ghcr.io/${{ github.repository }}/runner:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
