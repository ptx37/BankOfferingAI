name: CD — Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if ArgoCD server check fails"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:

  # --------------------------------------------------------------------------
  # Build and push Docker images to ghcr.io
  # --------------------------------------------------------------------------

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ vars.ARGOCD_ENABLED == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api
          - services/worker
          - services/notification
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bankoffer-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=staging-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # ArgoCD sync to staging
  # --------------------------------------------------------------------------

  deploy-staging:
    name: ArgoCD Sync to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [docker-build-push]
    # Skip if ArgoCD server secret is not configured (infrastructure not provisioned yet)
    if: ${{ vars.ARGOCD_ENABLED == 'true' && secrets.ARGOCD_SERVER != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Login to ArgoCD
        run: |
          argocd login "${{ secrets.ARGOCD_SERVER }}" \
            --username "${{ secrets.ARGOCD_USERNAME }}" \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --grpc-web

      - name: Sync staging applications
        run: |
          argocd app sync bankoffer-staging \
            --revision "${{ github.sha }}" \
            --prune \
            --grpc-web

      - name: Wait for healthy state
        run: |
          argocd app wait bankoffer-staging \
            --timeout 300 \
            --health \
            --grpc-web

      - name: Verify deployment
        run: |
          argocd app get bankoffer-staging --grpc-web
          echo "Staging deployment completed for commit ${{ github.sha }}"

  skip-notice:
    name: ArgoCD Not Yet Configured
    runs-on: ubuntu-latest
    if: ${{ vars.ARGOCD_ENABLED != 'true' }}
    steps:
      - name: Notice
        run: |
          echo "ℹ️  Skipping ArgoCD sync — infrastructure not provisioned yet."
          echo "Set repository variable ARGOCD_ENABLED=true and secrets ARGOCD_SERVER,"
          echo "ARGOCD_USERNAME, ARGOCD_PASSWORD once the EKS cluster is running."
