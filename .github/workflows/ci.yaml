name: CI Pipeline

on:
  push:
    branches: [main, "bogdandragos", "agent/**", "sub/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  python-lint:
    name: Python Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run mypy type-check
        run: mypy --ignore-missing-imports services/ ml/ data/

  pytest-coverage:
    name: Pytest with Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=services --cov=ml --cov=data \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint all Helm charts
        run: |
          for chart in infra/helm/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $chart..."
              helm lint "$chart"
            else
              echo "Skipping $chart — no Chart.yaml found"
            fi
          done

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init and validate
        run: |
          cd infra/terraform
          for module in modules/*/; do
            if [ -f "$module/main.tf" ]; then
              echo "Validating $module..."
              cd "$module"
              terraform init -backend=false
              terraform validate
              cd -
            else
              echo "Skipping $module — no main.tf found"
            fi
          done

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api
          - services/worker
          - services/notification
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            docker build --no-cache -t bankoffer-${{ matrix.service }}:ci "${{ matrix.service }}"
          else
            echo "No Dockerfile in ${{ matrix.service }} — skipping"
          fi

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

  openapi-validation:
    name: OpenAPI Spec Validation (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Validate OpenAPI specs
        run: |
          found=false
          for spec in $(find . -name "openapi*.yaml" -o -name "openapi*.yml" -o -name "openapi*.json"); do
            echo "Validating $spec..."
            spectral lint "$spec" --ruleset "spectral:oas"
            found=true
          done
          if [ "$found" = false ]; then
            echo "No OpenAPI spec files found — skipping"
          fi

  audit-schema-validation:
    name: Audit YAML Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: pip install pyyaml jsonschema

      - name: Validate audit.yaml schema
        run: |
          python - <<'PYEOF'
          import yaml
          import sys

          with open("audit.yaml", "r") as f:
              data = yaml.safe_load(f)

          errors = []

          # Validate top-level keys
          required_keys = {"meta", "agents", "history"}
          missing = required_keys - set(data.keys())
          if missing:
              errors.append(f"Missing top-level keys: {missing}")

          # Validate meta section
          meta = data.get("meta", {})
          for field in ["project", "version", "github_repo", "audit_policy"]:
              if field not in meta:
                  errors.append(f"meta.{field} is missing")

          if meta.get("audit_policy") != "append_only":
              errors.append("meta.audit_policy must be 'append_only'")

          # Validate agents section
          agents = data.get("agents", {})
          for agent_name, agent_data in agents.items():
              if "status" not in agent_data:
                  errors.append(f"agents.{agent_name}.status is missing")
              if "depth" not in agent_data:
                  errors.append(f"agents.{agent_name}.depth is missing")
              if "max_tasks" not in agent_data:
                  errors.append(f"agents.{agent_name}.max_tasks is missing")

          # Validate history is a list
          if not isinstance(data.get("history"), list):
              errors.append("history must be a list")

          if errors:
              print("audit.yaml validation FAILED:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print("audit.yaml schema validation passed")
          PYEOF
