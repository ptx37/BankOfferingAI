name: bankoffer_analytics
version: "1.0.0"
config-version: 2

profile: bankoffer

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Lookback windows for feature computation
  txn_lookback_days_short: 7
  txn_lookback_days_medium: 30
  txn_lookback_days_long: 90

models:
  bankoffer_analytics:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    intermediate:
      +materialized: table
      +schema: intermediate
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts", "ml"]
