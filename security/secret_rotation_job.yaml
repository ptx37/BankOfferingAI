apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-credential-rotation
  namespace: bankoffer-prod
  labels:
    app.kubernetes.io/name: db-credential-rotation
    app.kubernetes.io/part-of: bankoffer
    app.kubernetes.io/component: security
spec:
  # Run weekly on Sunday at 02:00 UTC
  schedule: "0 2 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: db-credential-rotation
            app.kubernetes.io/component: security
        spec:
          restartPolicy: OnFailure
          serviceAccountName: db-credential-rotation-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          initContainers:
            # Vault Agent injects a new Postgres password into a shared volume
            - name: vault-agent
              image: hashicorp/vault:1.15
              args:
                - agent
                - -config=/vault/config/agent-config.hcl
              env:
                - name: VAULT_ADDR
                  value: "http://vault.vault.svc.cluster.local:8200"
                - name: VAULT_SKIP_VERIFY
                  value: "false"
              volumeMounts:
                - name: vault-config
                  mountPath: /vault/config
                  readOnly: true
                - name: shared-credentials
                  mountPath: /vault/secrets
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          containers:
            - name: rotate-credentials
              image: ghcr.io/your-org/bankoffer-toolbox:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting DB credential rotation"

                  NEW_PASSWORD=$(cat /vault/secrets/new-db-password)
                  if [ -z "$NEW_PASSWORD" ]; then
                    echo "ERROR: No new password injected by Vault agent" >&2
                    exit 1
                  fi

                  # Update the Kubernetes secret with the new credentials
                  kubectl create secret generic bankoffer-db-credentials \
                    --from-literal=url="postgresql://${DB_USERNAME}:${NEW_PASSWORD}@${DB_HOST}:5432/${DB_NAME}" \
                    --from-literal=password="${NEW_PASSWORD}" \
                    --namespace=bankoffer-prod \
                    --dry-run=client -o yaml | kubectl apply -f -

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Kubernetes secret updated"

                  # Trigger a rolling restart of API and worker pods to pick up new creds
                  kubectl rollout restart deployment/bankoffer-api -n bankoffer-prod
                  kubectl rollout restart deployment/bankoffer-worker -n bankoffer-prod

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Rolling restart triggered"

                  # Wait for rollouts to complete
                  kubectl rollout status deployment/bankoffer-api -n bankoffer-prod --timeout=300s
                  kubectl rollout status deployment/bankoffer-worker -n bankoffer-prod --timeout=300s

                  echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Credential rotation complete"
              env:
                - name: DB_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: bankoffer-db-config
                      key: host
                - name: DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: bankoffer-db-config
                      key: name
                - name: DB_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: bankoffer-db-credentials
                      key: username
              volumeMounts:
                - name: shared-credentials
                  mountPath: /vault/secrets
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                limits:
                  cpu: 250m
                  memory: 128Mi
                requests:
                  cpu: 50m
                  memory: 64Mi
          volumes:
            - name: vault-config
              configMap:
                name: vault-agent-config
            - name: shared-credentials
              emptyDir:
                medium: Memory
---
# Service account for the rotation job with minimal RBAC permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-credential-rotation-sa
  namespace: bankoffer-prod
  labels:
    app.kubernetes.io/name: db-credential-rotation
    app.kubernetes.io/part-of: bankoffer
  annotations:
    # If using IRSA (IAM Roles for Service Accounts) for AWS Secrets Manager access
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/bankoffer-secret-rotation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: db-credential-rotation
  namespace: bankoffer-prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
    resourceNames: ["bankoffer-db-credentials"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
    resourceNames: ["bankoffer-api", "bankoffer-worker"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: db-credential-rotation
  namespace: bankoffer-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: db-credential-rotation
subjects:
  - kind: ServiceAccount
    name: db-credential-rotation-sa
    namespace: bankoffer-prod
